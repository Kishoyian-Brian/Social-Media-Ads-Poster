services:
  - type: web
    name: social-media-api
    runtime: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npx prisma migrate deploy && npm start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PUBLIC_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
